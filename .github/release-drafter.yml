name-template: 'v$NEXT_PATCH_VERSION 🚀'
tag-template: 'v$NEXT_PATCH_VERSION'
template: |
  ## What's Changed
  $CHANGES
  
  ## 📝 Summary
  *   **New Features**: $LABELED_FEAT
  *   **Bug Fixes**: $LABELED_FIX
  *   **Maintenance**: $LABELED_CHORE

  ## ⚙️ Dependencies
  $DEPENDENCIES
  
  **Full Changelog**: $URL/compare/$PREVIOUS_TAG...$RESOLVED_TAG
change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'fix'
      - 'bugfix'
  - title: '⚙️ Maintenance'
    labels:
      - 'chore'
      - 'refactor'
version-resolver:
  major:
    labels:
      - 'major'
  minor:
    labels:
      - 'minor'
      - 'feature'
  patch:
    labels:
      - 'patch'
      - 'fix'
  default: patch
