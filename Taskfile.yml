version: "3"

tasks:
  build:
    desc: Build the final .jar for WireMock
    cmds:
      - ./gradlew clean jar
      - echo "The compiled jar can be found in build/libs/"

  test:
    desc: Run tests for the project
    cmds:
      - ./gradlew test

  clean:
    desc: Clean the build directory
    cmds:
      - ./gradlew clean
